<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Product Preview Card Component</title>
    <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <div class="card">
            <img class="card-image-desktop" src="./assets/images/image-product-desktop.jpg" alt="">
            <img class="card-image-mobile" src="./assets/images/image-product-mobile.jpg" alt="">
            <div class="text-group">
                <p class="text-type">P E R F U M E</p>
                <h1>Gabrielle Essence Eau De Parfum</h1>
                <p class="text-description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
                    Perfumer-Creator for the House of CHANEL.</p>
                    <div class="text-price">
                        <h2>$149.99</h2>
                        <p>$169.99</p>
                    </div>
                    <button class="card-button"><img src="./assets/images/icon-cart.svg" alt="">Add to Cart</button>
            </div>
        </div>
    </main>

    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" rel="noopener noreferrer"
            target="_blank">Frontend Mentor</a>.
        Coded by <a href="https://github.com/lorena-front" rel="noopener noreferrer" target="_blank">Lorena</a>.
    </footer>
</body>
</html>
